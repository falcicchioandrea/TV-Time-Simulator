<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Explore - My Movie List</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    </head>

    <body>
        <!-- Header -->
        <header class="header" aria-label="Site Header">
            <h1>Explore</h1>
        </header>

        <!-- Main Content -->
         <main class="main-content" aria-label="Main Content Area">
            <section class="search-section" aria-label="Search Section">
                <div class="search__header">
                    <h2>Search</h2>
                </div>

                <form class="search-form" role="search" aria-label="Search Form">
                    <input type="text" placeholder="Search for series or films..." aria-label="Search input">
                    <button type="submit" aria-label="Submit search"><i class="fas fa-search"></i></button>
                </form>
            </section>
        </main>

        <!-- Footer-->
        <footer class="footer" aria-label="Site Footer">
            <nav aria-label="Main navigation">
                <ul class="nav-list">
                    <li><a href="#" aria-label="Series"><i class="fas fa-tv"></i> Series</a></li>
                    <li><a href="#" aria-label="Films"><i class="fas fa-clapperboard"></i> Films</a></li>
                    <li><a href="explore.html" aria-label="Explore"><i class="fas fa-search"></i> Explore</a></li>
                    <li><a href="index.html" aria-label="Profile"><i class="fas fa-user"></i> Profile</a></li>
                </ul>
            </nav>
         </footer>
    </body>
</html>
