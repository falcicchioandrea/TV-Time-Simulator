<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Explore - TV Time</title>
        <link rel="icon" href="assets/favicon.ico" type="image/x-icon"> 
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <!-- Header -->
        <header class="header explore-header" aria-label="Site Header">
            <h1>Explore</h1>
            <button class="menu-btn" id="menu-btn" aria-label="Open settings menu"><i class="fa-solid fa-bars"></i></button>
        </header>

        <!-- Side Menu -->
        <nav class="side-menu" id="side-menu" aria-label="Settings Menu">
            <div class="menu-header">
                <h3>Menù</h3>
                <button id="close-menu-btn" aria-label="Chiudi Menu">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <ul>
                <li><a href="#"><i class="fas fa-cog"></i> Impostazioni </a></li>
                <li><a href="#"><i class="fas fa-share"></i> Condividi </a></li>
                <li><a href="#"><i class="far fa-circle-question"></i> Help Center </a></li>
            </ul>
        </nav>

        <div class="menu-overlay" id="menu-overlay"></div>

        <!-- Main Content -->
        <main class="main-content" aria-label="Main Content Area">
            <section class="search-section" aria-label="Search Section">

                <form class="search-form" role="search" aria-label="Search Form">
                    <input type="text" placeholder="Search for series or films..." aria-label="Search input">
                    <button type="button" class="cancel-btn"><i class="fas fa-times"></i></button>
                </form>
            </section>

            <section class="results-list" aria-label="Risultati della ricerca">
                
            <div class="result-film">
                <div class="img-film-container">
                    <img src="assets/TheBoys.png" alt="The Boys" class="result-poster">
                </div>
                <div class="result-details">
                    <h3 class="result-title">The Boys</h3>
                    <p class="result-stats">
                        <i class="fas fa-tv"></i> 2,33 Mln hanno aggiunto questa serie
                    </p>
                </div>
                <button class="add-to-list-btn" aria-label="Aggiungi The Boys alla tua lista">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div class="result-film">
                <div class="img-film-container">
                    <img src="assets/euphoria.png" alt="Euphoria" class="result-poster">
                </div>
                <div class="result-details">
                    <h3 class="result-title">Euphoria</h3>
                    <p class="result-stats">
                        <i class="fas fa-tv"></i> 2,42 Mln hanno aggiunto questa serie
                    </p>
                </div>
                <button class="add-to-list-btn" aria-label="Aggiungi Euphoria alla tua lista">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            </section>
        </main>

        <!-- Footer-->
        <footer class="footer" aria-label="Site Footer">
            <nav aria-label="Main navigation">
                <ul class="nav-list">
                    <li><a href="#" aria-label="Series"><i class="fas fa-tv"></i> Series</a></li>
                    <li><a href="#" aria-label="Films"><i class="fas fa-clapperboard"></i> Films</a></li>
                    <li><a href="explore.html" aria-label="Explore"><i class="fas fa-search"></i> Explore</a></li>
                    <li><a href="index.html" aria-label="Profile"><i class="fas fa-user"></i> Profile</a></li>
                </ul>
            </nav>
         </footer>
    </body>
</html>
